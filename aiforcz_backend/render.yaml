# Render Blueprint Configuration for AIForcz Backend
services:
  - type: web
    name: aiforcz-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: aiforcz-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: aiforcz-db
    databaseName: aiforcz
    plan: free