# Render Blueprint Configuration for AIForcz Frontend
services:
  - type: static
    name: aiforcz-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: aiforcz-backend
          property: host